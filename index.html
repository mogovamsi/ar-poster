<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        /* Start Screen */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: sans-serif;
        }
        /* Info Overlay */
        #info-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 999; padding: 20px; box-sizing: border-box;
            font-family: sans-serif; overflow-y: auto;
        }
        .btn { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .back-btn { background: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>Poster AR Experience</h2>
        <p>Ready to begin?</p>
        <button class="btn" onclick="startExperience()">START AR</button>
    </div>

    <div id="info-overlay">
        <button class="btn back-btn" onclick="closePage()">← Back to AR</button>
        <h1 id="page-title"></h1>
        <p id="page-content"></p>
        <img id="page-img" src="" style="width:100%; border-radius: 10px;">
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="poster-video" src="./assets/video.mp4" loop="true" crossorigin="anonymous" playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video id="ar-video-entity" src="#poster-video" width="1" height="0.6" position="0 0 0.01"
                     sound="src: #poster-video; autoplay: false; loop: true; volume: 1; positional: false">
            </a-video>

            <a-plane class="clickable" position="-0.3 -0.4 0.02" width="0.3" height="0.1" material="opacity: 0; transparent: true"
                     onclick="openPage('Highlighted Word', 'Description text here...', './assets/img-a.jpg')">
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        const startScreen = document.getElementById('start-screen');
        const infoOverlay = document.getElementById('info-overlay');
        const videoFile = document.getElementById('poster-video');

        function startExperience() {
            console.log("Start button clicked!"); // Check this in phone's inspect tool if possible
            startScreen.style.display = 'none';
            
            // Start the actual video file
            videoFile.play().catch(err => console.log("Video play failed:", err));
            
            // Start the A-Frame sound component
            const entity = document.getElementById('ar-video-entity');
            if (entity.components.sound) {
                entity.components.sound.playSound();
            }
        }

        function openPage(title, content, imgSrc) {
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-content').innerText = content;
            document.getElementById('page-img').src = imgSrc;
            infoOverlay.style.display = 'block';
            videoFile.pause();
        }

        function closePage() {
            infoOverlay.style.display = 'none';
            videoFile.play();
        }
    </script>
</body>
</html>
