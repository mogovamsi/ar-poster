<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        #info-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 999; padding: 20px; box-sizing: border-box;
            font-family: sans-serif; overflow-y: auto;
        }
        .back-btn { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
	<div id="start-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; text-align: center;">
    <h2>Poster AR Experience</h2>
    <p>Tap the button below to start the camera and video.</p>
    <button onclick="startExperience()" style="padding: 15px 30px; font-size: 18px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px;">START AR</button>
</div>
    <div id="info-overlay">
        <button class="back-btn" onclick="closePage()">← Back to AR</button>
        <h1 id="page-title"></h1>
        <p id="page-content"></p>
        <img id="page-img" src="" style="width:100%; border-radius: 10px;">
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="poster-video" src="./assets/video.mp4" loop="true" crossorigin="anonymous" playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video src="#poster-video" width="1" height="0.6" position="0 0 0.01"></a-video>

            <a-plane class="clickable" position="-0.3 -0.4 0.02" width="0.3" height="0.1" material="opacity: 0; transparent: true"
                     onclick="openPage('Highlighted Word 1', 'Detailed info for the first word goes here.', './assets/img-a.jpg')">
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
		function startExperience() {
    // Hide the start screen
    document.getElementById('start-screen').style.display = 'none';
    
    // Explicitly tell the video to play
    const video = document.getElementById('poster-video');
    video.play();
    
    // If your video has sound, browsers might still block it. 
    // This line ensures it plays regardless.
    video.muted = true; 
}
        const overlay = document.getElementById('info-overlay');
        const video = document.getElementById('poster-video');
        function openPage(t, c, i) {
            document.getElementById('page-title').innerText = t;
            document.getElementById('page-content').innerText = c;
            document.getElementById('page-img').src = i;
            overlay.style.display = 'block';
            video.pause();
        }
        function closePage() { overlay.style.display = 'none'; video.play(); }
    </script>
</body>
</html>
