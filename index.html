<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: sans-serif;
        }
        #info-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 999; padding: 20px; box-sizing: border-box;
            font-family: sans-serif; overflow-y: auto;
        }
        .btn { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .back-btn { background: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>Poster AR Experience</h2>
        <p>Tap to enter and hear background music.</p>
        <button class="btn" onclick="startExperience()">ENTER EXPERIENCE</button>
    </div>

    <div id="info-overlay">
        <button class="btn back-btn" onclick="closePage()">← Back to AR</button>
        <h1 id="page-title"></h1>
        <p id="page-content"></p>
        <img id="page-img" src="" style="width:100%; border-radius: 10px;">
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="poster-video" src="./assets/video.mp4" crossorigin="anonymous" playsinline></video>
            <audio id="bg-music" src="./assets/background.mp3" loop="true" crossorigin="anonymous"></audio>
            <img id="play-icon" src="https://cdn-icons-png.flaticon.com/512/0/375.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video id="ar-video-entity" src="#poster-video" width="1" height="0.6" position="0 0 0.01"
                     sound="src: #poster-video; autoplay: false; loop: false; volume: 1; positional: false">
            </a-video>

            <a-image id="video-play-btn" class="clickable" src="#play-icon" position="0 0 0.05" width="0.2" height="0.2"
                     onclick="playMainVideo()">
            </a-image>

            <a-plane class="clickable" position="-0.3 -0.4 0.02" width="0.3" height="0.1" material="opacity: 0; transparent: true"
                     onclick="openPage('Highlighted Word', 'Description...', './assets/img-a.jpg')">
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        const startScreen = document.getElementById('start-screen');
        const videoFile = document.getElementById('poster-video');
        const bgMusic = document.getElementById('bg-music');
        const playBtnVisual = document.getElementById('video-play-btn');

        function startExperience() {
            startScreen.style.display = 'none';
            // Start the background music immediately upon entering
            bgMusic.play();
        }

        function playMainVideo() {
            // 1. Mute the background music
            bgMusic.pause();
            
            // 2. Play the main video and its sound
            videoFile.play();
            const entity = document.getElementById('ar-video-entity');
            if (entity.components.sound) {
                entity.components.sound.playSound();
            }

            // 3. Hide the play button visual
            playBtnVisual.setAttribute('visible', false);

            // 4. When video ends, bring back background music and play button
            videoFile.onended = function() {
                bgMusic.play();
                playBtnVisual.setAttribute('visible', true);
            };
        }

        function openPage(title, content, imgSrc) {
            document.getElementById('info-overlay').style.display = 'block';
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-content').innerText = content;
            document.getElementById('page-img').src = imgSrc;
            
            // Pause everything when reading
            videoFile.pause();
            bgMusic.pause();
        }

        function closePage() {
            document.getElementById('info-overlay').style.display = 'none';
            // If the video was already playing, resume it; otherwise, resume BG music
            if (!videoFile.paused) {
                videoFile.play();
            } else {
                bgMusic.play();
            }
        }
    </script>
</body>
</html>
