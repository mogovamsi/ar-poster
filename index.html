<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            color: white; font-family: sans-serif;
        }
        #info-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: white; z-index: 999; padding: 20px; box-sizing: border-box;
            font-family: sans-serif; overflow-y: auto;
        }
        .btn { padding: 15px 30px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        .back-btn { background: #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2>Poster AR Experience</h2>
        <p>Tap to enter and hear background music.</p>
        <button class="btn" onclick="startExperience()">ENTER EXPERIENCE</button>
    </div>

    <div id="info-overlay">
        <button class="btn back-btn" onclick="closePage()">← Back to AR</button>
        <h1 id="page-title"></h1>
        <p id="page-content"></p>
        <img id="page-img" src="" style="width:100%; border-radius: 10px;">
    </div>

    <a-scene mindar-image="imageTargetSrc: ./assets/targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="main-video" src="./assets/video.mp4" crossorigin="anonymous" playsinline></video>
            <audio id="humming-bg" src="./assets/background.mp3" loop="true" crossorigin="anonymous"></audio>
            <img id="play-icon" src="./assets/play-btn.png">
            <img id="pause-icon" src="./assets/pause-btn.png">
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-video id="video-entity" src="#main-video" width="1" height="0.6" position="0 0 0.01"
                     sound="src: #main-video; autoplay: false; volume: 1; positional: false">
            </a-video>

            <a-image id="control-button" class="clickable" src="#play-icon" 
                     position="0 0 0.05" width="0.2" height="0.2"
                     onclick="toggleVideo()">
            </a-image>
        </a-entity>
    </a-scene>

    <script>
        const startScreen = document.getElementById('start-screen');
        const videoFile = document.getElementById('main-video');
        const bgMusic = document.getElementById('humming-bg');

        function startExperience() {
            startScreen.style.display = 'none';
            // Start the background music immediately upon entering
            bgMusic.play().catch(e => console.log("Audio play failed:", e));
        }

        function toggleVideo() {
            const btn = document.getElementById('control-button');
            const ent = document.getElementById('video-entity');

            if (videoFile.paused) {
                // PLAY LOGIC
                bgMusic.pause();
                videoFile.play();
                if (ent.components.sound) ent.components.sound.playSound();
                btn.setAttribute('src', '#pause-icon');
                btn.setAttribute('visible', 'false'); // Hide while playing
            } else {
                // PAUSE LOGIC
                videoFile.pause();
                bgMusic.play();
                btn.setAttribute('src', '#play-icon');
                btn.setAttribute('visible', 'true');
            }
        }

        // Return to background music when video ends
        videoFile.onended = () => {
            const btn = document.getElementById('control-button');
            btn.setAttribute('src', '#play-icon');
            btn.setAttribute('visible', 'true');
            bgMusic.play();
        };

        function openPage(title, content, imgSrc) {
            document.getElementById('info-overlay').style.display = 'block';
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-content').innerText = content;
            document.getElementById('page-img').src = imgSrc;
            
            videoFile.pause();
            bgMusic.pause();
        }

        function closePage() {
            document.getElementById('info-overlay').style.display = 'none';
            if (!videoFile.paused) {
                videoFile.play();
            } else {
                bgMusic.play();
            }
        }
    </script>
</body>
</html>
